name: bootstrap

# Scans every repo in the org for content catalogs, commits .string-audit.json
# sentinels to newly-discovered ones, then triggers the aggregate workflow so
# the merged catalog refreshes immediately.
#
# Schedule: weekly (Sundays 23:00 UTC) — always writes; triggers aggregate after.
# Manual: workflow_dispatch — dry-run by default; set dry-run=false to commit.
#
# Requires BOOTSTRAP_TOKEN secret: a PAT with `repo` scope across the org.
# Without it the scan still works (GITHUB_TOKEN reads public repos), but
# --write falls back to GITHUB_TOKEN which can only write to this repo.

on:
  schedule:
    - cron: "0 23 * * 0" # Sundays 23:00 UTC (before Monday's aggregate at 06:00)
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Scan only — do not commit sentinels"
        type: boolean
        default: true
      repo:
        description: "Single repo name to target (leave blank for all)"
        type: string
        default: ""

permissions:
  contents: read
  actions: write # needed to trigger aggregate after writing sentinels

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"

      - run: npm ci --no-audit --no-fund

      - name: Bootstrap sentinels
        env:
          GITHUB_TOKEN: ${{ secrets.BOOTSTRAP_TOKEN || secrets.GITHUB_TOKEN }}
          ORG: bounded-systems
        run: |
          ARGS=""
          # schedule always writes; dispatch respects dry-run input
          # (boolean dispatch inputs are strings "true"/"false" in shell)
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.dry-run }}" = "false" ]; then
            ARGS="--write"
          fi
          if [ -n "${{ inputs.repo }}" ]; then
            ARGS="$ARGS --repo=${{ inputs.repo }}"
          fi
          node bootstrap.mjs $ARGS

      - name: Trigger aggregate (if new sentinels were written)
        # Only fire when we actually wrote something — avoids a spurious aggregate run
        # on dry-run dispatches or weeks with no new repos.
        if: >
          github.event_name == 'schedule' ||
          inputs.dry-run == false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FOUND=$(node -e "try{const r=JSON.parse(require('fs').readFileSync('bootstrap-report.json','utf8'));process.stdout.write(String(r.found.length))}catch{process.stdout.write('0')}")
          if [ "$FOUND" -gt "0" ]; then
            echo "  $FOUND new repo(s) — triggering aggregate"
            gh workflow run aggregate.yml --repo bounded-systems/content-catalog
          else
            echo "  no new repos — skipping aggregate trigger"
          fi

      - name: Upload report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: bootstrap-report
          path: bootstrap-report.json
